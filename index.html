<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2rem;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 40px;
        }

        .search-box {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 40px;
        }

        input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #4f46e5; }

        button {
            padding: 14px 28px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #4338ca; }
        button:disabled { background: #a5b4fc; cursor: not-allowed; }

        #status {
            color: #666;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }

        .results {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 800px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            flex: 1;
            min-width: 220px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border: 2px solid transparent;
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-2px); }

        .card.cheapest {
            border-color: #4f46e5;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .app-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #1a1a1a;
        }

        .badge {
            background: #4f46e5;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .price {
            font-size: 2rem;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .product-name {
            color: #666;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .stock {
            margin-top: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .in-stock { color: #16a34a; }
        .out-stock { color: #dc2626; }

        .error {
            color: #dc2626;
            background: #fef2f2;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 500;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #e0e0e0;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h1>🛒 Price Tracker</h1>
    <p class="subtitle">Compare prices across Blinkit and Zepto instantly</p>

    <div class="search-box">
        <input
            type="text"
            id="searchInput"
            placeholder="Search for milk, eggs, bread..."
            onkeydown="if(event.key==='Enter') search()"
        />
        <button onclick="search()" id="searchBtn">Search</button>
    </div>

    <div id="status"></div>
    <div class="results" id="results"></div>

    <script>
        async function search() {
            const query = document.getElementById("searchInput").value.trim();
            if (!query) return;

            const btn = document.getElementById("searchBtn");
            const status = document.getElementById("status");
            const results = document.getElementById("results");

            // loading state
            btn.disabled = true;
            btn.textContent = "Searching...";
            status.innerHTML = '<span class="spinner"></span> Searching Blinkit and Zepto...';
            results.innerHTML = "";

            try {
                const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                status.textContent = "";

                if (data.error) {
                    results.innerHTML = `<div class="error">❌ ${data.error}</div>`;
                    return;
                }

                // render cards
                const apps = Object.entries(data.results)
                    .sort((a, b) => a[1].price - b[1].price);

                results.innerHTML = apps.map(([app, info]) => `
                    <div class="card ${app === data.cheapest ? 'cheapest' : ''}">
                        <div class="card-header">
                            <span class="app-name">${app}</span>
                            ${app === data.cheapest ? '<span class="badge">🏆 Cheapest</span>' : ''}
                        </div>
                        <div class="price">₹${info.price}</div>
                        <div class="product-name">${info.name}</div>
                        <div class="stock ${info.in_stock ? 'in-stock' : 'out-stock'}">
                            ${info.in_stock ? '✅ In Stock' : '❌ Out of Stock'}
                        </div>
                    </div>
                `).join("");

            } catch (err) {
                status.textContent = "";
                results.innerHTML = `<div class="error">❌ Something went wrong. Try again.</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = "Search";
            }
        }
    </script>

</body>
</html>
